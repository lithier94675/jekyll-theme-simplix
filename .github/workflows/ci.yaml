on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - run: |
          bundle install
          bundle exec jekyll build --incremental --baseurl ${{ github.event.repository.name }}
          npm install -g html-minifier-terser terser
          find _site -name "*.html" -exec html-minifier-terser {} -o {} --collapse-whitespace --remove-comments --minify-css --minify-js \;
          find _site -name "*.js" -exec terser {} -o {} -c -m \;
        env:
          JEKYLL_ENV: production
      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
