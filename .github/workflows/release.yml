on:
  release:
    types:
      [released]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bash script/release
        env:
          REPO: ${{ github.event.repository.name }}
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
